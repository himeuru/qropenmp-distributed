<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>qropenmp-distributed</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    padding: 32px 24px 64px;
  }
  .container { max-width: 920px; margin: 0 auto; }
  header { margin-bottom: 24px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 13px; }

  .tabs {
    display: flex; gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .tab {
    background: none; border: none; color: var(--muted);
    padding: 10px 16px; cursor: pointer; font: inherit; font-weight: 500;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab:hover { color: var(--text); }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .panel h2 { font-size: 14px; font-weight: 600; margin-bottom: 14px; color: var(--text); }

  form { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
  label {
    display: flex; flex-direction: column; gap: 6px;
    font-size: 12px; color: var(--muted); font-weight: 500;
  }
  input[type=number], input[type=text] {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: 6px;
    font: inherit;
    min-width: 140px;
  }
  input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(88,166,255,0.2); }
  button.primary {
    background: var(--accent); color: #0d1117; border: none;
    padding: 9px 18px; border-radius: 6px;
    font: inherit; font-weight: 600;
    cursor: pointer;
  }
  button.primary:hover { opacity: 0.92; }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .status-line { margin-top: 16px; display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .badge {
    display: inline-block; padding: 2px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 600; text-transform: lowercase;
  }
  .badge.queued, .badge.deferred { background: rgba(139,148,158,.18); color: var(--muted); }
  .badge.started { background: rgba(210,153,34,.18); color: var(--yellow); }
  .badge.finished { background: rgba(63,185,80,.18); color: var(--green); }
  .badge.failed { background: rgba(248,81,73,.18); color: var(--red); }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
  tbody tr:last-child td { border-bottom: none; }

  .mono { font-family: "JetBrains Mono", "Cascadia Mono", Consolas, monospace; font-size: 12px; }
  .muted { color: var(--muted); }

  .result-block {
    margin-top: 16px; padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 8px;
  }
  .result-block .lead { font-size: 14px; }
  .result-block b { color: var(--accent); font-weight: 600; }

  .chart-wrap { margin-top: 16px; }
  .chart { width: 100%; height: 300px; }
  .chart-bar { fill: var(--accent); }
  .chart-axis { stroke: var(--border); stroke-width: 1; }
  .chart-label { fill: var(--muted); font-size: 11px; font-family: "JetBrains Mono", monospace; }
  .chart-title { fill: var(--text); font-size: 13px; font-weight: 600; }
  .chart-legend { fill: var(--muted); font-size: 11px; }

  .footer { margin-top: 24px; color: var(--muted); font-size: 12px; text-align: center; }
  .footer a { color: var(--accent); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>qropenmp-distributed</h1>
    <p class="subtitle">Distributed QR decomposition over Redis + OpenMP workers.</p>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="single">Single job</button>
    <button class="tab" data-tab="bench">Benchmark</button>
  </div>

  <div id="tab-single">
    <div class="panel">
      <h2>Decompose a random matrix</h2>
      <form id="single-form">
        <label>Matrix size (n)
          <input type="number" name="n" value="512" min="2" max="8192">
        </label>
        <label>Threads
          <input type="number" name="threads" value="4" min="0" max="64">
        </label>
        <label>Seed
          <input type="number" name="seed" value="42">
        </label>
        <button type="submit" class="primary">Submit</button>
      </form>
      <div id="single-status"></div>
      <div id="single-result"></div>
    </div>
  </div>

  <div id="tab-bench" hidden>
    <div class="panel">
      <h2>Speedup benchmark</h2>
      <form id="bench-form">
        <label>Matrix size (n)
          <input type="number" name="n" value="512" min="64" max="2048">
        </label>
        <label>Thread counts (comma-separated)
          <input type="text" name="threads" value="1,2,4,8" placeholder="1,2,4,8">
        </label>
        <button type="submit" class="primary">Run benchmark</button>
      </form>
      <div id="bench-status"></div>
      <div id="bench-result"></div>
    </div>
  </div>

  <div class="panel">
    <h2>Recent jobs (last 10)</h2>
    <table id="history">
      <thead>
        <tr><th>Job</th><th>n</th><th>Threads</th><th>Elapsed</th><th>Status</th><th>When</th></tr>
      </thead>
      <tbody><tr><td colspan="6" class="muted mono">no jobs yet</td></tr></tbody>
    </table>
  </div>

  <div class="footer">
    JSON API at <a href="/docs">/docs</a> &middot; Source on
    <a href="https://github.com/himeuru/qropenmp-distributed">GitHub</a>
  </div>
</div>

<script>
const HISTORY_KEY = "qropenmp-history-v1";

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]"); }
  catch { return []; }
}
function pushHistory(item) {
  const items = loadHistory();
  items.unshift({...item, ts: Date.now()});
  localStorage.setItem(HISTORY_KEY, JSON.stringify(items.slice(0, 10)));
  renderHistory();
}
function timeAgo(ts) {
  const s = Math.round((Date.now() - ts) / 1000);
  if (s < 60) return s + "s ago";
  if (s < 3600) return Math.round(s/60) + "m ago";
  return Math.round(s/3600) + "h ago";
}
function renderHistory() {
  const items = loadHistory();
  const tbody = document.querySelector("#history tbody");
  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="muted mono">no jobs yet</td></tr>';
    return;
  }
  tbody.innerHTML = items.map(j => `
    <tr>
      <td class="mono">${j.job_id.slice(0, 8)}</td>
      <td>${j.n}</td>
      <td>${j.threads}</td>
      <td>${j.elapsed_ms != null ? j.elapsed_ms.toFixed(2) + " ms" : "—"}</td>
      <td><span class="badge ${j.status}">${j.status}</span></td>
      <td class="muted mono">${timeAgo(j.ts)}</td>
    </tr>
  `).join("");
}
renderHistory();
setInterval(renderHistory, 15000);

document.querySelectorAll(".tab").forEach(t => {
  t.onclick = () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.toggle("active", x === t));
    document.getElementById("tab-single").hidden = t.dataset.tab !== "single";
    document.getElementById("tab-bench").hidden = t.dataset.tab !== "bench";
  };
});

async function submitRandom(n, threads, seed) {
  const r = await fetch("/jobs/random", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({n: Number(n), threads: Number(threads), seed: Number(seed)})
  });
  if (!r.ok) {
    const text = await r.text();
    throw new Error(`submit failed (${r.status}): ${text}`);
  }
  return r.json();
}

async function fetchStatus(jobId) {
  const r = await fetch(`/jobs/${jobId}`);
  if (!r.ok) throw new Error(`status fetch failed (${r.status})`);
  return r.json();
}

async function waitForJob(jobId, onUpdate) {
  while (true) {
    const s = await fetchStatus(jobId);
    onUpdate(s);
    if (s.status === "finished" || s.status === "failed") return s;
    await new Promise(res => setTimeout(res, 400));
  }
}

document.getElementById("single-form").onsubmit = async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector("button");
  btn.disabled = true;
  const fd = new FormData(e.target);
  const n = fd.get("n"), threads = fd.get("threads"), seed = fd.get("seed");
  const statusBox = document.getElementById("single-status");
  const resultBox = document.getElementById("single-result");
  resultBox.innerHTML = "";
  statusBox.innerHTML = `<div class="status-line mono muted">submitting...</div>`;
  try {
    const { job_id } = await submitRandom(n, threads, seed);
    const final = await waitForJob(job_id, (s) => {
      statusBox.innerHTML = `<div class="status-line mono">job ${job_id.slice(0,8)} <span class="badge ${s.status}">${s.status}</span></div>`;
    });
    if (final.status === "failed") {
      resultBox.innerHTML = `<pre class="mono result-block" style="color:var(--red)">${final.error || "failed"}</pre>`;
      pushHistory({ job_id, n, threads, status: "failed" });
      return;
    }
    const r = final.result;
    resultBox.innerHTML = `
      <div class="result-block">
        <div class="lead">Decomposed <b>${r.n}&times;${r.n}</b> in <b>${r.elapsed_ms.toFixed(2)} ms</b> using <b>${r.threads_used}</b> thread(s).</div>
        <div class="mono muted">diag(R)[:5]&nbsp;&nbsp;${r.diag_r_head.slice(0,5).map(x => x.toFixed(3)).join(", ")}</div>
        <div class="mono muted">diag(R)[-5:] ${r.diag_r_tail.slice(-5).map(x => x.toFixed(3)).join(", ")}</div>
      </div>
    `;
    pushHistory({ job_id, n, threads, status: "finished", elapsed_ms: r.elapsed_ms });
  } catch (err) {
    statusBox.innerHTML = `<div class="status-line mono" style="color:var(--red)">${err.message}</div>`;
  } finally {
    btn.disabled = false;
  }
};

document.getElementById("bench-form").onsubmit = async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector("button");
  btn.disabled = true;
  const fd = new FormData(e.target);
  const n = Number(fd.get("n"));
  const threadList = String(fd.get("threads")).split(",")
    .map(s => Number(s.trim()))
    .filter(t => Number.isFinite(t) && t > 0);
  if (threadList.length < 2) {
    document.getElementById("bench-status").innerHTML =
      `<div class="status-line mono" style="color:var(--red)">need at least 2 thread counts</div>`;
    btn.disabled = false;
    return;
  }
  const statusBox = document.getElementById("bench-status");
  const resultBox = document.getElementById("bench-result");
  resultBox.innerHTML = "";

  const records = [];
  try {
    for (const t of threadList) {
      statusBox.innerHTML = `<div class="status-line mono muted">running n=${n}, threads=${t} (${records.length+1}/${threadList.length})</div>`;
      const { job_id } = await submitRandom(n, t, 42);
      const final = await waitForJob(job_id, () => {});
      if (final.status === "failed") throw new Error(`job for threads=${t} failed`);
      records.push({ threads: t, elapsed_ms: final.result.elapsed_ms });
      pushHistory({ job_id, n, threads: t, status: "finished", elapsed_ms: final.result.elapsed_ms });
    }
    statusBox.innerHTML = `<div class="status-line mono muted">done — ${records.length} runs</div>`;
    renderBenchmark(n, records);
  } catch (err) {
    statusBox.innerHTML = `<div class="status-line mono" style="color:var(--red)">${err.message}</div>`;
  } finally {
    btn.disabled = false;
  }
};

function renderBenchmark(n, records) {
  const baseline = records[0].elapsed_ms;
  const enriched = records.map(r => {
    const speedup = baseline / r.elapsed_ms;
    return { ...r, speedup, eff: (speedup / r.threads) * 100 };
  });

  const tableHtml = `
    <table style="margin-top:16px">
      <thead><tr><th>Threads</th><th>Time</th><th>Speedup</th><th>Efficiency</th></tr></thead>
      <tbody>
        ${enriched.map(r => `
          <tr>
            <td>${r.threads}</td>
            <td class="mono">${r.elapsed_ms.toFixed(2)} ms</td>
            <td class="mono">${r.speedup.toFixed(2)}&times;</td>
            <td class="mono">${r.eff.toFixed(1)}%</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;

  document.getElementById("bench-result").innerHTML =
    tableHtml + `<div class="chart-wrap">${buildChart(n, enriched)}</div>`;
}

function buildChart(n, records) {
  const W = 720, H = 300, padL = 50, padR = 20, padT = 36, padB = 36;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const p = 0.82;
  const amdahl = t => 1 / ((1 - p) + p / t);

  const yMax = Math.max(
    ...records.map(r => r.speedup),
    ...records.map(r => amdahl(r.threads)),
    1
  ) * 1.15;
  const barWidth = innerW / records.length * 0.6;
  const slot = innerW / records.length;
  const yScale = v => padT + innerH - (v / yMax) * innerH;

  const yTicks = [];
  const tickStep = yMax > 6 ? 2 : 1;
  for (let v = 0; v <= yMax; v += tickStep) {
    yTicks.push(`
      <line class="chart-axis" x1="${padL}" x2="${W - padR}" y1="${yScale(v)}" y2="${yScale(v)}" opacity="0.5"/>
      <text class="chart-label" x="${padL - 8}" y="${yScale(v) + 4}" text-anchor="end">${v.toFixed(0)}&times;</text>
    `);
  }

  const bars = records.map((r, i) => {
    const cx = padL + slot * i + slot / 2;
    const x = cx - barWidth / 2;
    const y = yScale(r.speedup);
    const h = padT + innerH - y;
    return `
      <rect class="chart-bar" x="${x}" y="${y}" width="${barWidth}" height="${h}" rx="3"/>
      <text class="chart-label" x="${cx}" y="${y - 6}" text-anchor="middle">${r.speedup.toFixed(2)}&times;</text>
      <text class="chart-label" x="${cx}" y="${padT + innerH + 18}" text-anchor="middle">T=${r.threads}</text>
    `;
  }).join("");

  const amdahlPts = records.map((r, i) => {
    const cx = padL + slot * i + slot / 2;
    return `${cx},${yScale(amdahl(r.threads))}`;
  }).join(" ");

  return `
    <svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      <text class="chart-title" x="${padL}" y="22">Speedup vs threads &mdash; n=${n}</text>
      <text class="chart-legend" x="${W - padR}" y="22" text-anchor="end">dashed: Amdahl, p=${p}</text>
      ${yTicks.join("")}
      ${bars}
      <polyline points="${amdahlPts}" fill="none" stroke="rgba(201,209,217,0.5)" stroke-width="1.5" stroke-dasharray="5 4"/>
      ${records.map((r, i) => {
        const cx = padL + slot * i + slot / 2;
        return `<circle cx="${cx}" cy="${yScale(amdahl(r.threads))}" r="3" fill="rgba(201,209,217,0.7)"/>`;
      }).join("")}
    </svg>
  `;
}
</script>
</body>
</html>
